<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Desktop Dashboard</title>
<style>
  :root{
    --glass-bg: rgba(255,255,255,0.10);
    --glass-bg-strong: rgba(255,255,255,0.16);
    --glass-border: rgba(255,255,255,0.28);
    --text-main: #ffffff;
    --text-dim: rgba(255,255,255,0.72);
    --text-faint: rgba(255,255,255,0.5);
    --accent: #6ea8fe;
    --accent-soft: rgba(110,168,254,0.35);
    --shadow: 0 8px 32px rgba(0,0,0,0.35);
    --radius-lg: 26px;
    --radius-md: 18px;
    --radius-sm: 12px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    height:100%;
    font-family:'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color:var(--text-main);
    overflow:hidden;
  }

  body{
    position:relative;
    width:100%;
    height:100vh;
    background:
      radial-gradient(ellipse at top, rgba(100,150,255,0.25), transparent 60%),
      linear-gradient(180deg, #7fb0e8 0%, #a9c9ea 35%, #cfd9e0 100%);
  }

  /* ---------- Background city scene (illustrated, original, no IP) ---------- */
  .scene{
    position:absolute; inset:0;
    background:url('assets/background.png') center center / cover no-repeat;
    overflow:hidden;
  }
  .cloud{
    position:absolute; background:rgba(255,255,255,0.85);
    border-radius:50%;
    filter:blur(1px);
    opacity:0.9;
  }
  .building{
    position:absolute; bottom:0;
    background:linear-gradient(180deg, #4f6f95, #33465f);
    opacity:0.55;
  }
  .building.light{ background:linear-gradient(180deg, #7ea3c9, #5a7ba0); opacity:0.5;}
  .window{
    position:absolute;
    width:6px; height:9px;
    background:rgba(255,240,200,0.55);
  }
  .avatar-figure{
    position:absolute;
    right:8%;
    bottom:0;
    width:340px;
    height:78%;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    filter: drop-shadow(0 30px 40px rgba(0,0,0,0.25));
  }

  /* ---------- Glass panel base ---------- */
  .glass{
    background:var(--glass-bg);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    backdrop-filter: blur(28px) saturate(140%);
    border:1px solid var(--glass-border);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
  }

  /* ---------- Layout ---------- */
  .main-panel{
    position:absolute;
    top:6%;
    left:14%;
    width:64%;
    height:64%;
    padding:34px 40px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
    z-index:5;
  }

  /* Left sidebar icons */
  .side-dock{
    position:absolute;
    top:14%;
    left:4%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    padding:20px 12px;
    z-index:6;
    width:66px;
  }
  .side-dock .icon-btn{
    width:46px; height:46px;
    border-radius:50%;
    background:rgba(0,0,0,0.55);
    display:flex; align-items:center; justify-content:center;
    color:#fff;
    cursor:pointer;
    transition:transform .2s ease;
  }
  .side-dock .icon-btn:hover{ transform:scale(1.08); }
  .side-dock .icon-btn.search{ background:rgba(255,255,255,0.85); color:#222; }

  /* Clock + date */
  .clock-block{ grid-column:1 / span 2; }
  .clock-time{
    font-size:58px;
    font-weight:700;
    letter-spacing:2px;
    line-height:1;
    font-variant-numeric:tabular-nums;
  }
  .clock-date{
    margin-top:8px;
    font-size:19px;
    font-weight:500;
    color:var(--text-dim);
  }

  /* Calendar card */
  .calendar-card{
    padding:22px 22px 16px;
  }
  .calendar-title{
    font-size:20px;
    font-weight:700;
    margin-bottom:14px;
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px 4px;
    font-size:13px;
    text-align:center;
  }
  .cal-grid .dow{
    color:var(--text-faint);
    font-weight:600;
    font-size:12px;
  }
  .cal-grid .dow.today{ color:var(--accent); }
  .cal-grid span{
    padding:5px 0;
    border-radius:8px;
    color:var(--text-dim);
  }
  .cal-grid span.today{
    background:var(--accent);
    color:#fff;
    font-weight:700;
  }
  .cal-grid span.muted{ color:var(--text-faint); }

  /* Profile card */
  .profile-card{
    grid-column:2 / 3;
    padding:20px 22px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .profile-top{
    display:flex; align-items:center; gap:14px;
  }
  .profile-avatar{
    width:56px; height:56px; border-radius:50%;
    background:linear-gradient(135deg,#5a7ba0,#7ea3c9);
    display:flex;align-items:center;justify-content:center;
    font-weight:700; font-size:20px;
    border:2px solid rgba(255,255,255,0.6);
    flex-shrink:0;
  }
  .profile-name{
    font-size:17px; font-weight:700;
    display:flex; align-items:center; gap:6px;
  }
  .badge{
    width:16px;height:16px;border-radius:50%;
    background:var(--accent);
    display:inline-flex;align-items:center;justify-content:center;
    font-size:10px;
  }
  .profile-handle{ font-size:13px; color:var(--text-dim); }
  .view-profile-btn{
    margin-left:auto;
    background:rgba(255,255,255,0.18);
    border:1px solid var(--glass-border);
    color:#fff;
    font-size:12px;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
  }
  .view-profile-btn:hover{ background:rgba(255,255,255,0.28); }

  .gallery-row{
    display:flex; gap:10px;
  }
  .gallery-thumb{
    flex:1;
    aspect-ratio:1/1;
    border-radius:var(--radius-sm);
    background:linear-gradient(160deg,#7ea3c9,#3d5674);
    position:relative;
    overflow:hidden;
  }
  .gallery-thumb::after{
    content:'';
    position:absolute; inset:0;
    background:radial-gradient(circle at 30% 20%, rgba(255,255,255,0.25), transparent 60%);
  }

  /* Music player */
  .music-card{
    grid-column:2 / 3;
    padding:18px 20px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .music-top{
    display:flex; align-items:center; gap:12px;
  }
  .music-art{
    width:44px;height:44px;border-radius:10px;
    background:linear-gradient(160deg,#f5c98a,#e79b6b);
    flex-shrink:0;
  }
  .music-info{ flex:1; min-width:0; }
  .music-title{ font-size:14px; font-weight:700; }
  .music-artist{ font-size:12px; color:var(--text-dim); }
  .heart-btn{
    width:30px;height:30px;border-radius:50%;
    background:rgba(255,255,255,0.14);
    display:flex;align-items:center;justify-content:center;
    color:#ff7a90; font-size:14px; cursor:pointer;
    border:none;
  }
  .music-controls{
    display:flex; align-items:center; justify-content:center; gap:20px;
  }
  .ctrl-btn{
    background:none;border:none;color:#fff;font-size:15px;cursor:pointer;
    opacity:0.85;
  }
  .ctrl-btn.play{
    width:38px;height:38px;border-radius:50%;
    background:#fff;color:#222;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;
  }
  .music-progress{
    display:flex; align-items:center; gap:10px;
    font-size:11px; color:var(--text-faint);
  }
  .progress-track{
    flex:1; height:4px; border-radius:2px;
    background:rgba(255,255,255,0.25);
    position:relative;
  }
  .progress-fill{
    position:absolute; left:0; top:0; bottom:0;
    width:38%;
    background:#fff;
    border-radius:2px;
  }
  .progress-dot{
    position:absolute; top:50%; left:38%;
    width:11px;height:11px;border-radius:50%;
    background:#fff;
    transform:translate(-50%,-50%);
    box-shadow:0 0 0 3px rgba(255,255,255,0.2);
  }

  /* Weather widget bottom-left */
  .weather-card{
    position:absolute;
    bottom:9%;
    left:4%;
    padding:14px 20px;
    display:flex; align-items:center; gap:14px;
    z-index:6;
  }
  .weather-icon{ font-size:30px; }
  .weather-temp{ font-size:24px; font-weight:700; }
  .weather-loc{ font-size:12px; font-weight:600; }
  .weather-desc{ font-size:11px; color:var(--text-dim); }

  /* Dock */
  .dock{
    position:absolute;
    bottom:5%;
    left:50%;
    transform:translateX(-50%);
    padding:12px 22px;
    display:flex;
    gap:20px;
    z-index:6;
  }
  .dock-icon{
    width:44px;height:44px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
    cursor:pointer;
    transition:transform .18s ease;
  }
  .dock-icon:hover{ transform:translateY(-6px) scale(1.05); }
  .dock-win{ background:linear-gradient(135deg,#4fb1ff,#2f6fe0); }
  .dock-spotify{ background:#1db954; }
  .dock-ps{ background:linear-gradient(135deg,#34294f,#001e36); color:#31a8ff; font-weight:800; font-size:14px; }
  .dock-chrome{ background:conic-gradient(from 90deg,#ea4335,#fbbc05,#34a853,#4285f4); border-radius:50%; }
  .dock-ae{ background:linear-gradient(135deg,#00005b,#9999ff); color:#d6b3ff; font-weight:800; font-size:13px; }
  .dock-discord{ background:#5865f2; }

  /* Bottom right status */
  .status-bar{
    position:absolute;
    bottom:9%;
    right:4%;
    padding:12px 22px;
    display:flex; align-items:center; gap:18px;
    font-size:13px;
    z-index:6;
  }
  .status-bar .sep{ width:1px; height:22px; background:rgba(255,255,255,0.25); }
  .status-time{ text-align:right; font-weight:600; }
  .status-date{ font-size:11px; color:var(--text-dim); text-align:right; }

  @media (max-width: 900px){
    .main-panel{ left:6%; width:88%; top:4%; height:auto; }
    .side-dock{ display:none; }
    .dock{ gap:10px; padding:10px 14px; }
    .dock-icon{ width:36px;height:36px;font-size:16px; }
    .weather-card, .status-bar{ padding:10px 14px; }
  }
</style>
</head>
<body>

<div class="scene"></div>

<!-- Left icon dock -->
<div class="side-dock glass">
  <div class="icon-btn search">🔍</div>
  <div class="icon-btn">🎵</div>
  <div class="icon-btn">▶️</div>
  <div class="icon-btn">📘</div>
  <div class="icon-btn">📷</div>
  <div class="icon-btn">✕</div>
</div>

<!-- Main glass panel -->
<div class="main-panel glass">
  <div class="clock-block">
    <div class="clock-time" id="clockTime">02:30</div>
    <div class="clock-date" id="clockDate">Monday&nbsp;&nbsp;05/27</div>
  </div>

  <div class="calendar-card glass">
    <div class="calendar-title">May</div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="profile-card glass">
    <div class="profile-top">
      <div class="profile-avatar">Ex</div>
      <div>
        <div class="profile-name">Expyy <span class="badge">✓</span></div>
        <div class="profile-handle">@expyy.exe</div>
      </div>
      <button class="view-profile-btn">View Profile</button>
    </div>
    <div class="gallery-row">
      <div class="gallery-thumb"></div>
      <div class="gallery-thumb"></div>
      <div class="gallery-thumb"></div>
    </div>
  </div>

  <div class="music-card glass">
    <div class="music-top">
      <div class="music-art"></div>
      <div class="music-info">
        <div class="music-title">Blue Sky</div>
        <div class="music-artist">Expyy</div>
      </div>
      <button class="heart-btn">♥</button>
    </div>
    <div class="music-controls">
      <button class="ctrl-btn">⏮</button>
      <button class="ctrl-btn play">▶</button>
      <button class="ctrl-btn">⏭</button>
    </div>
    <div class="music-progress">
      <span>1:24</span>
      <div class="progress-track"><div class="progress-fill"></div><div class="progress-dot"></div></div>
      <span>3:47</span>
    </div>
  </div>
</div>

<!-- Weather -->
<div class="weather-card glass">
  <div class="weather-icon">⛅</div>
  <div>
    <div class="weather-temp">24°</div>
    <div class="weather-loc">Tokyo, Japan</div>
    <div class="weather-desc">Partly Cloudy</div>
  </div>
</div>

<!-- Dock -->
<div class="dock glass">
  <div class="dock-icon dock-win">⊞</div>
  <div class="dock-icon dock-spotify">♫</div>
  <div class="dock-icon dock-ps">Ps</div>
  <div class="dock-icon dock-chrome"></div>
  <div class="dock-icon dock-ae">Ae</div>
  <div class="dock-icon dock-discord">◈</div>
</div>

<!-- Status bar -->
<div class="status-bar glass">
  <span>📶</span>
  <span>🔊</span>
  <span>🔋 100%</span>
  <div class="sep"></div>
  <div>
    <div class="status-time" id="statusTime">02:30 PM</div>
    <div class="status-date" id="statusDate">5/27/2024</div>
  </div>
</div>

<script>
  // Build calendar for the real current month/year, today highlighted live
  const calGrid = document.getElementById('calGrid');
  const now0 = new Date();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.querySelector('.calendar-title').textContent = monthNames[now0.getMonth()];

  const dows = ['S','M','T','W','T','F','S'];
  const todayDow = now0.getDay();
  dows.forEach((d,i)=>{
    const el = document.createElement('span');
    el.className = 'dow' + (i===todayDow ? ' today':'');
    el.textContent = d;
    calGrid.appendChild(el);
  });

  const year = now0.getFullYear();
  const month = now0.getMonth();
  const firstDayOfMonth = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayDate = now0.getDate();

  for(let i=0;i<firstDayOfMonth;i++){
    const el = document.createElement('span');
    el.className = 'muted';
    calGrid.appendChild(el);
  }
  for(let d=1; d<=daysInMonth; d++){
    const el = document.createElement('span');
    el.textContent = d;
    if(d === todayDate) el.classList.add('today');
    calGrid.appendChild(el);
  }

  // Live clock (visual only, styled like the reference which shows a fixed time)
  function pad(n){ return n.toString().padStart(2,'0'); }
  function updateClock(){
    const now = new Date();
    document.getElementById('clockTime').textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const day = days[now.getDay()];
    const dateStr = pad(now.getMonth()+1) + '/' + pad(now.getDate());
    document.getElementById('clockDate').textContent = day + '  ' + dateStr;

    let hours12 = now.getHours() % 12; if(hours12===0) hours12 = 12;
    const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
    document.getElementById('statusTime').textContent = pad(hours12) + ':' + pad(now.getMinutes()) + ' ' + ampm;
    document.getElementById('statusDate').textContent = (now.getMonth()+1) + '/' + now.getDate() + '/' + now.getFullYear();
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
